server.port=8080

spring.datasource.url=jdbc:sqlserver://sqlserver:1433;databaseName=reservationsdb;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=${SQL_SERVER_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

spring.jackson.time-zone=America/Bogota
spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=${JWT_SECRET}

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}

email.queue.key=email_queue

auth.service.url=http://auth-service:8081
