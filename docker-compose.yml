services:

  # ─────────────────────────────────────────────────────────────────────────────
  # INFRAESTRUCTURA
  # ─────────────────────────────────────────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SERVER_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "${SQL_SERVER_PASSWORD}"
        -No -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    platform: linux/amd64
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-init
    platform: linux/amd64
    environment:
      SA_PASSWORD: ${SQL_SERVER_PASSWORD}
    volumes:
      - ./init-db.sql:/init-db.sql
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c", "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P '${SQL_SERVER_PASSWORD}' -No -i /init-db.sql"]
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # MICROSERVICIOS — solo reservations y frontend expuestos al exterior
  # ─────────────────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      SQL_SERVER_PASSWORD: ${SQL_SERVER_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: on-failure

  reservations-demo:
    build:
      context: ./reservations-demo
    container_name: reservations-demo
    ports:
      - "8080:8080"
    environment:
      SQL_SERVER_PASSWORD: ${SQL_SERVER_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: on-failure

  email-service:
    build:
      context: ./email-service
    container_name: email-service
    environment:
      SQL_SERVER_PASSWORD: ${SQL_SERVER_PASSWORD}
      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: on-failure

  frontend-service:
    build:
      context: ./frontend-service
    container_name: frontend-service
    ports:
      - "8083:8083"
    depends_on:
      - reservations-demo
      - email-service
    restart: on-failure

volumes:
  sqlserver_data:
  redis_data:
